<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>走破記録 Version4.0</title><link rel="icon" href="data:,">
<style>*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif;max-width:900px;margin:32px auto;padding:20px;line-height:1.6;background:#f5f5f5}.navigation-links{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:18px}.back-link{display:inline-flex;align-items:center;min-height:44px;color:#2563eb;text-decoration:none;font-weight:700}h1{font-size:clamp(24px,4vw,36px);border-bottom:3px solid #4caf50;padding-bottom:10px}.record-form,.related-trips,.trip-status-summary{background:#fff;padding:22px;border-radius:10px}.trip-status-summary{margin-bottom:20px;border-left:6px solid #6b7280}.trip-status-summary h2{margin:0 0 8px;font-size:18px}#tripRouteStatus{font-size:20px;font-weight:700}.trip-status-note{margin:6px 0 0;color:#6b7280;font-size:14px}.item{margin-bottom:20px}label{display:block;font-weight:700;margin-bottom:6px;color:#444}input,textarea{width:100%;padding:10px;font-size:16px;border:1px solid #bbb;border-radius:5px}textarea{min-height:120px;resize:vertical}button{min-height:44px;padding:11px 22px;font-size:16px;border:0;border-radius:6px;cursor:pointer}#saveButton{background:#4caf50;color:#fff}#clearButton{background:#ddd}.record-actions{display:flex;flex-wrap:wrap;gap:10px}#message{margin-top:16px;font-weight:700;color:#2e7d32}.related-trips{margin-top:22px}.related-trips h2{margin-top:0}.related-trip-list{display:grid;gap:10px}.related-trip-link{display:block;padding:12px;border:1px solid #dbe3ea;border-radius:7px;color:#1d4ed8;font-weight:700;text-decoration:none}.related-trip-date{display:block;margin-top:3px;color:#6b7280;font-size:13px;font-weight:400}.related-trip-empty{color:#6b7280}[hidden]{display:none!important}.build-badge{position:fixed;right:10px;bottom:10px;z-index:9999;padding:6px 10px;border:1px solid #999;border-radius:6px;background:rgba(255,255,255,.92);color:#333;font-size:12px}@media(max-width:600px){body{margin:0;padding:12px}.record-form,.trip-status-summary,.related-trips{padding:17px}.record-actions{flex-direction:column}.record-actions button{width:100%}}</style></head>
<body><nav class="navigation-links"><a class="back-link" id="backToRouteLink" href="index.html">← 地図へ戻る</a><a class="back-link" id="backToTripLink" href="trip.html" hidden>← Tripへ戻る</a><a class="back-link" href="backup.html">データ管理</a></nav><h1 id="pageTitle">走破記録</h1><section id="tripStatusSummary" class="trip-status-summary"><h2>Tripから反映された走破状態</h2><div id="tripRouteStatus">未走破</div><p class="trip-status-note">一部走破・全線走破の状態はTripの走行順データから自動計算されます。</p></section><div class="record-form"><div class="item"><label for="date">走破日</label><input type="date" id="date"></div><div class="item"><label for="section">走破区間</label><input type="text" id="section"></div><div class="item"><label for="vehicle">使用車両</label><input type="text" id="vehicle"></div><div class="item"><label for="weather">天候</label><input type="text" id="weather"></div><div class="item"><label for="photo">写真</label><input type="text" id="photo"></div><div class="item"><label for="memo">走破メモ</label><textarea id="memo"></textarea></div><div class="record-actions"><button id="saveButton" type="button">保存</button><button id="clearButton" type="button">入力を消去</button></div><div id="message" aria-live="polite"></div></div><section class="related-trips"><h2>関連Trip</h2><div id="relatedTripsList" class="related-trip-list"><span class="related-trip-empty">関連Tripはありません。</span></div></section><div class="build-badge">Version 4.0 Build 20260722-01</div><script src="js/trip-data-v36.js?v=20260722-01"></script><script>
const params=new URLSearchParams(window.location.search);const routeNumber=params.get("route");const requestedTripId=params.get("trip");const validRouteNumber=routeNumber&&/^\d+$/.test(routeNumber)?String(Number(routeNumber)):"";if(!validRouteNumber){document.getElementById("pageTitle").textContent="路線番号が指定されていません"}else{document.getElementById("pageTitle").textContent=`一般国道${validRouteNumber}号　走破記録`;document.title=`国道${validRouteNumber}号 走破記録 Version4.0`;document.getElementById("backToRouteLink").href=`index.html?route=${validRouteNumber}`;document.getElementById("backToRouteLink").textContent=`← 国道${validRouteNumber}号へ戻る`}if(requestedTripId){const link=document.getElementById("backToTripLink");link.href=`trip.html?trip=${encodeURIComponent(requestedTripId)}&route=${encodeURIComponent(validRouteNumber)}`;link.hidden=false}const paddedRouteNumber=validRouteNumber?validRouteNumber.padStart(3,"0"):"unknown";const storageKey=`route${paddedRouteNumber}Record`;const fields=["date","section","vehicle","weather","photo","memo"];
function loadRecord(){const saved=localStorage.getItem(storageKey);if(!saved)return;try{const record=JSON.parse(saved);fields.forEach(field=>document.getElementById(field).value=record[field]||"")}catch(error){console.error(error);document.getElementById("message").textContent="保存済み記録を読み込めませんでした。"}}
function saveRecord(){if(!validRouteNumber){document.getElementById("message").textContent="路線番号が指定されていません。";return}let existing={};const saved=localStorage.getItem(storageKey);if(saved){try{const parsed=JSON.parse(saved);if(parsed&&typeof parsed==="object"&&!Array.isArray(parsed))existing=parsed;else{document.getElementById("message").textContent="保存済み記録の形式を確認できません。データ管理からバックアップして確認してください。";return}}catch(error){console.error(error);document.getElementById("message").textContent="保存済み記録を読み込めないため、上書きを中止しました。データ管理からバックアップしてください。";return}}const record={...existing,routeNumber:Number(validRouteNumber),updatedAt:new Date().toISOString()};fields.forEach(field=>record[field]=document.getElementById(field).value);try{localStorage.setItem(storageKey,JSON.stringify(record));document.getElementById("message").textContent="走破記録を保存しました。"}catch(error){console.error(error);document.getElementById("message").textContent="走破記録を保存できませんでした。現在の入力内容は消去していません。"}}
function clearRecord(){if(!window.confirm(`国道${validRouteNumber}号の走破記録を削除しますか？削除後は元に戻せません。`))return;try{localStorage.removeItem(storageKey);fields.forEach(field=>document.getElementById(field).value="");document.getElementById("message").textContent="入力内容を削除しました。"}catch(error){console.error(error);document.getElementById("message").textContent="走破記録を削除できませんでした。"}}
document.getElementById("saveButton").addEventListener("click",saveRecord);document.getElementById("clearButton").addEventListener("click",clearRecord);
function renderTripRouteStatus(){const status=window.Hokkaido48TripData.getRouteStatus(validRouteNumber);const el=document.getElementById("tripRouteStatus");const summary=document.getElementById("tripStatusSummary");const colors={"走破済":"#16a34a","走破中":"#ea580c","未走破":"#6b7280"};el.textContent=status;el.style.color=colors[status];summary.style.borderLeftColor=colors[status]}
function renderRelatedTrips(){const container=document.getElementById("relatedTripsList");const trips=window.Hokkaido48TripData.getRelatedTrips(validRouteNumber);container.innerHTML="";if(!trips.length){container.innerHTML='<span class="related-trip-empty">関連Tripはありません。</span>';return}trips.forEach(trip=>{const link=document.createElement("a");link.className="related-trip-link";link.href=`trip.html?trip=${encodeURIComponent(trip.id)}&route=${encodeURIComponent(validRouteNumber)}`;link.textContent=trip.tripName||"名称未登録";const segments=window.Hokkaido48TripData.getSegmentsForRoute(trip,validRouteNumber);const status=document.createElement("span");status.className="related-trip-date";status.textContent=segments.some(s=>s.status==="complete")?"全線走破":"一部走破";link.appendChild(status);if(trip.startDate){const date=document.createElement("span");date.className="related-trip-date";date.textContent=trip.startDate.replaceAll("-","/");link.appendChild(date)}container.appendChild(link)})}
loadRecord();renderTripRouteStatus();renderRelatedTrips();window.addEventListener("storage",event=>{if(event.key==="hokkaido48Trips"){renderTripRouteStatus();renderRelatedTrips()}});window.addEventListener("focus",()=>{renderTripRouteStatus();renderRelatedTrips()});
</script></body></html>
