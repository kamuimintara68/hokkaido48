<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>走破記録</title>

  <link rel="icon" href="data:,">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
      background: #f5f5f5;
    }

    h1 {
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.35;
      border-bottom: 3px solid #4caf50;
      padding-bottom: 10px;
    }

    .record-form {
      background: white;
      padding: 24px;
      border-radius: 8px;
    }

    .item {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #444;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 5px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      min-height: 44px;
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #saveButton {
      background: #4caf50;
      color: white;
    }

    #clearButton {
      background: #ddd;
    }

    .record-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    #message {
      margin-top: 16px;
      font-weight: bold;
      color: #2e7d32;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      color: #2563eb;
      text-decoration: none;
    }

    .navigation-links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }

    .related-trips {
      margin-top: 24px;
      padding: 24px;
      border-radius: 8px;
      background: white;
    }

    .trip-status-summary {
      margin-bottom: 24px;
      padding: 18px 24px;
      border-left: 6px solid #6b7280;
      border-radius: 8px;
      background: white;
    }

    .trip-status-summary h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    #tripRouteStatus {
      font-size: 20px;
      font-weight: bold;
    }

    .trip-status-note {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .related-trips h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .related-trip-list {
      display: grid;
      gap: 10px;
    }

    .related-trip-link {
      display: block;
      padding: 12px;
      border: 1px solid #dbe3ea;
      border-radius: 7px;
      color: #1d4ed8;
      font-weight: bold;
      text-decoration: none;
    }

    .related-trip-link:hover {
      background: #eff6ff;
    }

    .related-trip-date {
      display: block;
      margin-top: 3px;
      color: #6b7280;
      font-size: 13px;
      font-weight: normal;
    }

    .related-trip-empty {
      color: #6b7280;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 600px) {
      body {
        margin: 0 auto;
        padding: 12px;
      }

      .record-form,
      .trip-status-summary,
      .related-trips {
        padding: 18px;
      }

      .record-actions {
        flex-direction: column;
      }

      .record-actions button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <nav class="navigation-links">
    <a class="back-link" id="backToRouteLink" href="index.html">
      ← 地図へ戻る
    </a>
    <a class="back-link" id="backToTripLink" href="trip.html" hidden>
      ← Tripへ戻る
    </a>
    <a class="back-link" href="backup.html">
      データ管理
    </a>
  </nav>

  <h1 id="pageTitle">走破記録</h1>

  <section id="tripStatusSummary" class="trip-status-summary">
    <h2>Tripから反映された走破状態</h2>
    <div id="tripRouteStatus">未走破</div>
    <p class="trip-status-note">
      一部走破・全線走破の状態はTripの走行順データから自動計算されます。
    </p>
  </section>

  <div class="record-form">

    <div class="item">
      <label for="date">走破日</label>
      <input type="date" id="date">
    </div>

    <div class="item">
      <label for="section">走破区間</label>
      <input type="text" id="section">
    </div>

    <div class="item">
      <label for="vehicle">使用車両</label>
      <input type="text" id="vehicle">
    </div>

    <div class="item">
      <label for="weather">天候</label>
      <input type="text" id="weather">
    </div>

    <div class="item">
      <label for="photo">写真</label>
      <input type="text" id="photo">
    </div>

    <div class="item">
      <label for="memo">走破メモ</label>
      <textarea id="memo"></textarea>
    </div>

    <div class="record-actions">
      <button id="saveButton" type="button">保存</button>
      <button id="clearButton" type="button">入力を消去</button>
    </div>

    <div id="message" aria-live="polite"></div>

  </div>

  <section class="related-trips">
    <h2>関連Trip</h2>
    <div id="relatedTripsList" class="related-trip-list">
      <span class="related-trip-empty">関連Tripはありません。</span>
    </div>
  </section>

  <script src="js/trip-data-v36.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const routeNumber = params.get("route");
    const requestedTripId = params.get("trip");

    const validRouteNumber =
      routeNumber && /^\d+$/.test(routeNumber)
        ? String(Number(routeNumber))
        : "";

    if (!validRouteNumber) {
      document.getElementById("pageTitle").textContent =
        "路線番号が指定されていません";
    } else {
      document.getElementById("pageTitle").textContent =
        `一般国道${validRouteNumber}号　走破記録`;

      document.title =
        `国道${validRouteNumber}号 走破記録`;

      document.getElementById("backToRouteLink").href =
        `index.html?route=${validRouteNumber}`;

      document.getElementById("backToRouteLink").textContent =
        `← 国道${validRouteNumber}号へ戻る`;
    }

    if (requestedTripId) {
      const backToTripLink =
        document.getElementById("backToTripLink");

      backToTripLink.href =
        `trip.html?trip=${encodeURIComponent(requestedTripId)}&route=${encodeURIComponent(validRouteNumber)}`;

      backToTripLink.hidden = false;
    }

    const paddedRouteNumber =
      validRouteNumber
        ? validRouteNumber.padStart(3, "0")
        : "unknown";

    const storageKey =
      `route${paddedRouteNumber}Record`;

    const fields = [
      "date",
      "section",
      "vehicle",
      "weather",
      "photo",
      "memo"
    ];

    function loadRecord() {
      const savedData = localStorage.getItem(storageKey);

      if (!savedData) {
        return;
      }

      let record;

      try {
        record = JSON.parse(savedData);
      } catch (error) {
        console.error("走破記録読込エラー:", error);
        document.getElementById("message").textContent =
          "保存済み記録を読み込めませんでした。";
        return;
      }

      fields.forEach(function(field) {
        document.getElementById(field).value =
          record[field] || "";
      });
    }

    function saveRecord() {
      if (!validRouteNumber) {
        document.getElementById("message").textContent =
          "路線番号が指定されていません。";
        return;
      }

      let existingRecord = {};
      const savedData = localStorage.getItem(storageKey);

      if (savedData) {
        try {
          const parsedRecord = JSON.parse(savedData);

          if (
            parsedRecord &&
            typeof parsedRecord === "object" &&
            !Array.isArray(parsedRecord)
          ) {
            existingRecord = parsedRecord;
          } else {
            document.getElementById("message").textContent =
              "保存済み記録の形式を確認できません。データ管理からバックアップして確認してください。";
            return;
          }
        } catch (error) {
          console.error("既存走破記録読込エラー:", error);
          document.getElementById("message").textContent =
            "保存済み記録を読み込めないため、上書きを中止しました。データ管理からバックアップしてください。";
          return;
        }
      }

      const record = {
        ...existingRecord,
        routeNumber: Number(validRouteNumber),
        updatedAt: new Date().toISOString()
      };

      fields.forEach(function(field) {
        record[field] =
          document.getElementById(field).value;
      });

      try {
        localStorage.setItem(
          storageKey,
          JSON.stringify(record)
        );

        document.getElementById("message").textContent =
          "走破記録を保存しました。";
      } catch (error) {
        console.error("走破記録保存エラー:", error);
        document.getElementById("message").textContent =
          "走破記録を保存できませんでした。現在の入力内容は消去していません。";
      }
    }

    function clearRecord() {
      const confirmed = window.confirm(
        `国道${validRouteNumber}号の走破記録を削除しますか？削除後は元に戻せません。`
      );

      if (!confirmed) {
        return;
      }

      try {
        localStorage.removeItem(storageKey);

        fields.forEach(function(field) {
          document.getElementById(field).value = "";
        });

        document.getElementById("message").textContent =
          "入力内容を削除しました。";
      } catch (error) {
        console.error("走破記録削除エラー:", error);
        document.getElementById("message").textContent =
          "走破記録を削除できませんでした。";
      }
    }

    document
      .getElementById("saveButton")
      .addEventListener("click", saveRecord);

    document
      .getElementById("clearButton")
      .addEventListener("click", clearRecord);

    function renderTripRouteStatus() {
      const status =
        window.Hokkaido48TripData.getRouteStatus(
          validRouteNumber
        );

      const statusElement =
        document.getElementById("tripRouteStatus");

      const summaryElement =
        document.getElementById("tripStatusSummary");

      const colors = {
        "走破済": "#16a34a",
        "走破中": "#ea580c",
        "未走破": "#6b7280"
      };

      statusElement.textContent = status;
      statusElement.style.color = colors[status];
      summaryElement.style.borderLeftColor = colors[status];
    }

    function renderRelatedTrips() {
      const container =
        document.getElementById("relatedTripsList");

      const relatedTrips =
        window.Hokkaido48TripData.getRelatedTrips(
          validRouteNumber
        );

      container.innerHTML = "";

      if (relatedTrips.length === 0) {
        container.innerHTML =
          '<span class="related-trip-empty">関連Tripはありません。</span>';
        return;
      }

      relatedTrips.forEach(function(trip) {
        const link = document.createElement("a");
        link.className = "related-trip-link";
        link.href =
          `trip.html?trip=${encodeURIComponent(trip.id)}&route=${encodeURIComponent(validRouteNumber)}`;
        link.textContent =
          trip.tripName || "名称未登録";

        const routeSegments =
          window.Hokkaido48TripData.getSegmentsForRoute(
            trip,
            validRouteNumber
          );

        const statusText =
          routeSegments.some(segment =>
            segment.status === "complete"
          )
            ? "全線走破"
            : "一部走破";

        const status = document.createElement("span");
        status.className = "related-trip-date";
        status.textContent = statusText;
        link.appendChild(status);

        if (trip.startDate) {
          const date = document.createElement("span");
          date.className = "related-trip-date";
          date.textContent =
            trip.startDate.replaceAll("-", "/");
          link.appendChild(date);
        }

        container.appendChild(link);
      });
    }

    loadRecord();
    renderTripRouteStatus();
    renderRelatedTrips();

    window.addEventListener("storage", function(event) {
      if (event.key === "hokkaido48Trips") {
        renderTripRouteStatus();
        renderRelatedTrips();
      }
    });

    window.addEventListener("focus", function() {
      renderTripRouteStatus();
      renderRelatedTrips();
    });
  </script>

</body>
</html>
