<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>走破記録</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
      background: #f5f5f5;
    }

    h1 {
      border-bottom: 3px solid #4caf50;
      padding-bottom: 10px;
    }

    .record-form {
      background: white;
      padding: 24px;
      border-radius: 8px;
    }

    .item {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #444;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 5px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #saveButton {
      background: #4caf50;
      color: white;
    }

    #clearButton {
      margin-left: 10px;
      background: #ddd;
    }

    #message {
      margin-top: 16px;
      font-weight: bold;
      color: #2e7d32;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <a class="back-link" href="index.html">← 地図へ戻る</a>

  <h1 id="pageTitle">走破記録</h1>

  <div class="record-form">

    <div class="item">
      <label for="date">走破日</label>
      <input type="date" id="date">
    </div>

    <div class="item">
      <label for="section">走破区間</label>
      <input type="text" id="section">
    </div>

    <div class="item">
      <label for="vehicle">使用車両</label>
      <input type="text" id="vehicle">
    </div>

    <div class="item">
      <label for="weather">天候</label>
      <input type="text" id="weather">
    </div>

    <div class="item">
      <label for="photo">写真</label>
      <input type="text" id="photo">
    </div>

    <div class="item">
      <label for="memo">走破メモ</label>
      <textarea id="memo"></textarea>
    </div>

    <div class="item">
      <label for="note">note記事</label>
      <input type="url" id="note">
    </div>

    <div class="item">
      <label for="ferment">Ferment Log</label>
      <textarea id="ferment"></textarea>
    </div>

    <button id="saveButton" type="button">保存</button>
    <button id="clearButton" type="button">入力を消去</button>

    <div id="message"></div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const routeNumber = params.get("route");

    if (!routeNumber) {
      document.getElementById("pageTitle").textContent =
        "路線番号が指定されていません";
    } else {
      document.getElementById("pageTitle").textContent =
        `一般国道${routeNumber}号　走破記録`;

      document.title =
        `国道${routeNumber}号 走破記録`;
    }

    const paddedRouteNumber =
      routeNumber ? routeNumber.padStart(3, "0") : "unknown";

    const storageKey =
      `route${paddedRouteNumber}Record`;

    const fields = [
      "date",
      "section",
      "vehicle",
      "weather",
      "photo",
      "memo",
      "note",
      "ferment"
    ];

    function loadRecord() {
      const savedData = localStorage.getItem(storageKey);

      if (!savedData) {
        return;
      }

      const record = JSON.parse(savedData);

      fields.forEach(function(field) {
        document.getElementById(field).value =
          record[field] || "";
      });
    }

    function saveRecord() {
      if (!routeNumber) {
        document.getElementById("message").textContent =
          "路線番号が指定されていません。";
        return;
      }

      const record = {};

      fields.forEach(function(field) {
        record[field] =
          document.getElementById(field).value;
      });

      localStorage.setItem(
        storageKey,
        JSON.stringify(record)
      );

      document.getElementById("message").textContent =
        "走破記録を保存しました。";
    }

    function clearRecord() {
      fields.forEach(function(field) {
        document.getElementById(field).value = "";
      });

      localStorage.removeItem(storageKey);

      document.getElementById("message").textContent =
        "入力内容を消去しました。";
    }

    document
      .getElementById("saveButton")
      .addEventListener("click", saveRecord);

    document
      .getElementById("clearButton")
      .addEventListener("click", clearRecord);

    loadRecord();
  </script>

</body>
</html>
