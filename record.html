<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>走破記録</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
      background: #f5f5f5;
    }

    h1 {
      border-bottom: 3px solid #4caf50;
      padding-bottom: 10px;
    }

    .record-form {
      background: white;
      padding: 24px;
      border-radius: 8px;
    }

    .item {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #444;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 5px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #saveButton {
      background: #4caf50;
      color: white;
    }

    #clearButton {
      margin-left: 10px;
      background: #ddd;
    }

    #message {
      margin-top: 16px;
      font-weight: bold;
      color: #2e7d32;
    }

    .back-link {
      display: inline-block;
      color: #2563eb;
      text-decoration: none;
    }

    .navigation-links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }

    .related-trips {
      margin-top: 24px;
      padding: 24px;
      border-radius: 8px;
      background: white;
    }

    .related-trips h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .related-trip-list {
      display: grid;
      gap: 10px;
    }

    .related-trip-link {
      display: block;
      padding: 12px;
      border: 1px solid #dbe3ea;
      border-radius: 7px;
      color: #1d4ed8;
      font-weight: bold;
      text-decoration: none;
    }

    .related-trip-link:hover {
      background: #eff6ff;
    }

    .related-trip-date {
      display: block;
      margin-top: 3px;
      color: #6b7280;
      font-size: 13px;
      font-weight: normal;
    }

    .related-trip-empty {
      color: #6b7280;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 600px) {
      body {
        margin: 16px auto;
        padding: 12px;
      }

      .record-form,
      .related-trips {
        padding: 18px;
      }

      #clearButton {
        margin-top: 10px;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>

  <nav class="navigation-links">
    <a class="back-link" id="backToRouteLink" href="index.html">
      ← 地図へ戻る
    </a>
    <a class="back-link" id="backToTripLink" href="trip.html" hidden>
      ← Tripへ戻る
    </a>
  </nav>

  <h1 id="pageTitle">走破記録</h1>

  <div class="record-form">

    <div class="item">
      <label for="date">走破日</label>
      <input type="date" id="date">
    </div>

    <div class="item">
      <label for="section">走破区間</label>
      <input type="text" id="section">
    </div>

    <div class="item">
      <label for="vehicle">使用車両</label>
      <input type="text" id="vehicle">
    </div>

    <div class="item">
      <label for="weather">天候</label>
      <input type="text" id="weather">
    </div>

    <div class="item">
      <label for="photo">写真</label>
      <input type="text" id="photo">
    </div>

    <div class="item">
      <label for="memo">走破メモ</label>
      <textarea id="memo"></textarea>
    </div>

    <button id="saveButton" type="button">保存</button>
    <button id="clearButton" type="button">入力を消去</button>

    <div id="message"></div>

  </div>

  <section class="related-trips">
    <h2>関連Trip</h2>
    <div id="relatedTripsList" class="related-trip-list">
      <span class="related-trip-empty">関連Tripはありません。</span>
    </div>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const routeNumber = params.get("route");
    const requestedTripId = params.get("trip");

    const validRouteNumber =
      routeNumber && /^\d+$/.test(routeNumber)
        ? String(Number(routeNumber))
        : "";

    if (!validRouteNumber) {
      document.getElementById("pageTitle").textContent =
        "路線番号が指定されていません";
    } else {
      document.getElementById("pageTitle").textContent =
        `一般国道${validRouteNumber}号　走破記録`;

      document.title =
        `国道${validRouteNumber}号 走破記録`;

      document.getElementById("backToRouteLink").href =
        `index.html?route=${validRouteNumber}`;

      document.getElementById("backToRouteLink").textContent =
        `← 国道${validRouteNumber}号へ戻る`;
    }

    if (requestedTripId) {
      const backToTripLink =
        document.getElementById("backToTripLink");

      backToTripLink.href =
        `trip.html?trip=${encodeURIComponent(requestedTripId)}&route=${encodeURIComponent(validRouteNumber)}`;

      backToTripLink.hidden = false;
    }

    const paddedRouteNumber =
      validRouteNumber
        ? validRouteNumber.padStart(3, "0")
        : "unknown";

    const storageKey =
      `route${paddedRouteNumber}Record`;

    const fields = [
      "date",
      "section",
      "vehicle",
      "weather",
      "photo",
      "memo"
    ];

    function loadRecord() {
      const savedData = localStorage.getItem(storageKey);

      if (!savedData) {
        return;
      }

      let record;

      try {
        record = JSON.parse(savedData);
      } catch (error) {
        console.error("走破記録読込エラー:", error);
        document.getElementById("message").textContent =
          "保存済み記録を読み込めませんでした。";
        return;
      }

      fields.forEach(function(field) {
        document.getElementById(field).value =
          record[field] || "";
      });
    }

    function saveRecord() {
      if (!validRouteNumber) {
        document.getElementById("message").textContent =
          "路線番号が指定されていません。";
        return;
      }

      let existingRecord = {};
      const savedData = localStorage.getItem(storageKey);

      if (savedData) {
        try {
          const parsedRecord = JSON.parse(savedData);

          if (
            parsedRecord &&
            typeof parsedRecord === "object" &&
            !Array.isArray(parsedRecord)
          ) {
            existingRecord = parsedRecord;
          }
        } catch (error) {
          console.error("既存走破記録読込エラー:", error);
        }
      }

      const record = {
        ...existingRecord,
        routeNumber: Number(validRouteNumber),
        updatedAt: new Date().toISOString()
      };

      fields.forEach(function(field) {
        record[field] =
          document.getElementById(field).value;
      });

      localStorage.setItem(
        storageKey,
        JSON.stringify(record)
      );

      document.getElementById("message").textContent =
        "走破記録を保存しました。";
    }

    function clearRecord() {
      fields.forEach(function(field) {
        document.getElementById(field).value = "";
      });

      localStorage.removeItem(storageKey);

      document.getElementById("message").textContent =
        "入力内容を消去しました。";
    }

    document
      .getElementById("saveButton")
      .addEventListener("click", saveRecord);

    document
      .getElementById("clearButton")
      .addEventListener("click", clearRecord);

    function parseRouteNumbers(routeText) {
      if (!routeText) {
        return [];
      }

      return [
        ...new Set(
          String(routeText)
            .normalize("NFKC")
            .split(/[,\s、，・]+/)
            .map(value => value.replace(/[^0-9]/g, ""))
            .filter(Boolean)
        )
      ];
    }

    function getTrips() {
      const savedData =
        localStorage.getItem("hokkaido48Trips");

      if (!savedData) {
        return [];
      }

      try {
        return JSON.parse(savedData);
      } catch (error) {
        console.error("Tripデータ読込エラー:", error);
        return [];
      }
    }

    function renderRelatedTrips() {
      const container =
        document.getElementById("relatedTripsList");

      const relatedTrips =
        getTrips()
          .filter(trip =>
            parseRouteNumbers(trip.routes)
              .includes(validRouteNumber)
          )
          .sort((a, b) =>
            (b.startDate || "")
              .localeCompare(a.startDate || "")
          );

      container.innerHTML = "";

      if (relatedTrips.length === 0) {
        container.innerHTML =
          '<span class="related-trip-empty">関連Tripはありません。</span>';
        return;
      }

      relatedTrips.forEach(function(trip) {
        const link = document.createElement("a");
        link.className = "related-trip-link";
        link.href =
          `trip.html?trip=${encodeURIComponent(trip.id)}&route=${encodeURIComponent(validRouteNumber)}`;
        link.textContent =
          trip.tripName || "名称未登録";

        if (trip.startDate) {
          const date = document.createElement("span");
          date.className = "related-trip-date";
          date.textContent =
            trip.startDate.replaceAll("-", "/");
          link.appendChild(date);
        }

        container.appendChild(link);
      });
    }

    loadRecord();
    renderRelatedTrips();
  </script>

</body>
</html>
