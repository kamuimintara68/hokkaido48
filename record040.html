<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国道40号 走破記録へ移動</title>

  <script>
    const params =
      new URLSearchParams(window.location.search);

    params.set("route", "40");

    window.location.replace(
      `record.html?${params.toString()}`
    );
  </script>
</head>

<body>
  <p>
    <a href="record.html?route=40">
      国道40号の走破記録を開く

</html>
