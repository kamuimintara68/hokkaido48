<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>北海道48路線ふらふらlog Version3.2</title>

  <link rel="icon" href="data:,">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="app">

    <header class="header">

      <div>
        <h1 class="header-title">
          北海道48路線ふらふらlog
        </h1>

        <p class="header-subtitle">
          Route / Status / Photo / note / Ferment Log
        </p>
      </div>

      <div
        style="
          display:flex;
          align-items:center;
          gap:20px;
        "
      >

        <a
          href="trip.html"
          style="
            display:inline-block;
            padding:10px 18px;
            border-radius:8px;
            background:#ffffff;
            color:#1e3a8a;
            font-weight:bold;
            text-decoration:none;
            white-space:nowrap;
          "
        >
          Trip記録
        </a>

        <div class="progress-summary">

          <div
            class="progress-ring"
            id="progressDonut"
            style="--progress: 0%;"
          >
            <div class="progress-ring-center">
              <span id="progressPercent">0%</span>
            </div>
          </div>

          <div class="progress-text">

            <span class="progress-label">
              走破率
            </span>

            <strong>
              <span id="completedRouteCount">0</span>
              /
              <span id="totalRouteCount">48</span>
            </strong>

          </div>

        </div>

      </div>

    </header>

    <main class="main">

      <section class="map-area">
        <div id="map"></div>
      </section>

      <aside
        class="info-panel"
        id="infoPanel"
      >

        <h2 class="info-panel-title">
          Route Information
        </h2>

        <div
          class="empty-panel"
          id="emptyPanel"
        >

          <p class="empty-panel-title">
            路線を選択してください
          </p>

          <p class="empty-panel-text">
            地図上の国道をクリックすると、ここに情報が表示されます。
          </p>

        </div>

        <div
          class="panel-content"
          id="panelContent"
          hidden
        >

          <section class="route-summary">

            <span
              class="route-number"
              id="routeNumber"
            >
              Route
            </span>

            <h3
              class="route-name"
              id="routeName"
            >
              路線名
            </h3>

            <div class="route-meta-grid">

              <div class="route-meta-item">

                <span class="route-meta-label">
                  起点
                </span>

                <span id="routeStart">
                  未登録
                </span>

              </div>

              <div class="route-meta-item">

                <span class="route-meta-label">
                  終点
                </span>

                <span id="routeEnd">
                  未登録
                </span>

              </div>

            </div>

            <div class="status-box">

              <span class="status-label">
                走破状態
              </span>

              <span
                class="status-value"
                id="routeStatus"
              >
                未走破
              </span>

            </div>

          </section>

          <section class="content-grid">

            <article class="compact-card photo-card">

              <h3 class="compact-card-title">
                Photo
              </h3>

              <img
                id="routePhoto"
                src=""
                alt="Route Photo"
                class="route-photo"
              >

              <div
                class="compact-card-value"
                id="photoValue"
              >
                未登録
              </div>

            </article>

            <article class="compact-card">

              <h3 class="compact-card-title">
                note
              </h3>

              <div
                class="compact-card-value"
                id="noteValue"
              >
                未登録
              </div>

            </article>

            <article class="compact-card">

              <h3 class="compact-card-title">
                Ferment Log
              </h3>

              <div
                class="compact-card-value"
                id="fermentValue"
              >
                未登録
              </div>

            </article>

            <article class="compact-card">

              <h3 class="compact-card-title">
                走破記録
              </h3>

              <div
                class="compact-card-value"
                id="publicRecordValue"
              >
                未登録
              </div>

            </article>
            <article class="compact-card">

              <h3 class="compact-card-title">
                関連Trip
              </h3>

              <div
                class="compact-card-value"
                id="relatedTripsValue"
              >
                関連Tripなし
              </div>

            </article>
          </section>

        </div>

      </aside>

    </main>

  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>

  <script src="js/app.js"></script>

</body>
</html>
